# =============================================================
# Modular RAG MCP Server - Main Configuration
# =============================================================
# This file drives ALL pluggable components via Factory Pattern.
# Change a provider here → zero code change required.
# =============================================================

# --- LLM Configuration ---
llm:
  provider: azure          # azure | openai | ollama | deepseek
  model: gpt-4o
  azure_endpoint: "${AZURE_OPENAI_ENDPOINT}"
  api_key: "${AZURE_OPENAI_API_KEY}"
  api_version: "2024-02-15-preview"
  temperature: 0.0
  max_tokens: 4096

# --- Embedding Configuration ---
embedding:
  provider: azure          # openai | azure | ollama
  model: text-embedding-3-small
  azure_endpoint: "${AZURE_OPENAI_ENDPOINT}"
  api_key: "${AZURE_OPENAI_API_KEY}"
  api_version: "2024-02-15-preview"
  dimensions: 1536

# --- Vision LLM Configuration (Image Captioning) ---
vision_llm:
  provider: azure          # azure | openai | ollama
  model: gpt-4o
  azure_endpoint: "${AZURE_OPENAI_ENDPOINT}"
  api_key: "${AZURE_OPENAI_API_KEY}"
  api_version: "2024-02-15-preview"
  max_image_size: 2048     # Max dimension for image compression

# --- Vector Store Configuration ---
vector_store:
  backend: chroma          # chroma | qdrant | pinecone
  persist_path: ./data/db/chroma
  collection_name: default

# --- Splitter Configuration ---
splitter:
  provider: recursive      # recursive | semantic | fixed_length
  chunk_size: 1000
  chunk_overlap: 200

# --- Retrieval Configuration ---
retrieval:
  sparse_backend: bm25     # bm25 | elasticsearch
  fusion_algorithm: rrf    # rrf | weighted_sum
  rrf_k: 60                # RRF smoothing constant
  top_k_dense: 20
  top_k_sparse: 20
  top_k_final: 10

# --- Rerank Configuration ---
rerank:
  backend: none            # none | cross_encoder | llm
  model: cross-encoder/ms-marco-MiniLM-L-6-v2
  top_m: 30                # Number of candidates to rerank

# --- Ingestion Configuration ---
ingestion:
  bm25_index_path: ./data/db/bm25
  image_storage_path: ./data/images
  integrity_db_path: ./data/db/ingestion_history.db
  image_index_db_path: ./data/db/image_index.db
  chunk_refiner:
    use_llm: false         # Enable LLM-based chunk refinement
  metadata_enricher:
    use_llm: false         # Enable LLM-based metadata enrichment
  image_captioner:
    enabled: false         # Enable Vision LLM image captioning

# --- Evaluation Configuration ---
evaluation:
  backends:
    - custom               # ragas | custom
  golden_test_set: ./tests/fixtures/golden_test_set.json

# --- Observability Configuration ---
observability:
  enabled: true
  logging:
    log_file: ./logs/traces.jsonl
    log_level: INFO        # DEBUG | INFO | WARNING
  detail_level: standard   # minimal | standard | verbose

# --- Dashboard Configuration ---
dashboard:
  enabled: true
  port: 8501
  traces_dir: ./logs
  auto_refresh: true
  refresh_interval: 5
